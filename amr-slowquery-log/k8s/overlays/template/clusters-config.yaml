# One JSON array entry per cluster.
# Pod-0 reads index 0, Pod-1 reads index 1, and so on.
# To add a cluster: append an entry here and increase replicas-patch.yaml by 1.
# To remove a cluster: delete the LAST entry and decrease replicas-patch.yaml by 1.
apiVersion: v1
kind: Secret
metadata:
  name: amr-clusters-config
type: Opaque
stringData:
  clusters.json: |
    [
      {
        "AMR_CLUSTER_NAME": "<cluster-a-name>",
        "AMR_HOST": "<cluster-a>.southeastasia.redis.azure.net",
        "AMR_PORT": 10000,
        "AMR_ACCESS_KEY": "<access-key-a>",
        "AMR_CLUSTER_POLICY": "oss",
        "AMR_SSL_VERIFY": "false"
      }
    ]
